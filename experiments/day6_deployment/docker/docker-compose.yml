version: '3.8'

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ../experiments:/app/experiments:ro
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
  
  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ../frontend:/usr/share/nginx/html:ro
    restart: unless-stopped
